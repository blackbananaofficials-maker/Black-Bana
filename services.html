<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVICES | Black Banana</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="icon" type="image/png" href="logo_head.png">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                        body: ['Inter', 'sans-serif']
                    },
                    colors: {
                        bb: {
                            black: '#050505',
                            gold: '#F59E0B',
                            charcoal: '#0F0F0F',
                            glass: 'rgba(255, 255, 255, 0.05)'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
        }

        .service-card {
            position: relative;
            min-height: 400px;
            overflow: hidden;
            border-radius: 12px;
        }
    </style>
</head>

<body class="antialiased selection:bg-bb-gold selection:text-bb-black">

    <nav
        class="fixed top-0 w-full p-6 md:p-8 flex justify-between items-center z-50 mix-blend-exclusion text-white bg-black/50 backdrop-blur-md">
        <a href="blackbanana.html" class="block w-32 md:w-40 hover:opacity-80 transition-opacity">
            <img src="logo_navbar.png" alt="Black Banana">
        </a>
        <a href="blackbanana.html#contact"
            class="px-6 py-2 border border-white/20 rounded-full hover:bg-bb-gold hover:text-black hover:border-bb-gold transition-all uppercase text-xs font-bold tracking-widest hover-trigger">
            Let's Talk
        </a>
    </nav>

    <main class="pt-32 pb-24">

        <div class="container mx-auto px-6 mb-24 text-center">
            <h1 class="text-[8vw] md:text-6xl font-bold uppercase leading-none mb-6">Our <span
                    class="text-bb-gold">Services</span></h1>
            <p class="text-white/40 max-w-2xl mx-auto font-body text-lg">Comprehensive digital solutions engineered for
                growth, visibility, and dominance.</p>
        </div>

        <div class="container mx-auto px-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="servicesContainer">
                <!-- Dynamic Services Loading -->
            </div>
        </div>

    </main>

    <footer class="bg-black pt-32 pb-12 px-6 md:px-16 border-t border-white/10">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-12 mb-24">
            <div class="col-span-1 md:col-span-2">
                <h3 class="text-2xl font-bold uppercase mb-6">Black Banana</h3>
                <p class="text-white/40 font-body max-w-sm mb-8">
                    We are a digital-first agency obsessed with performance, aesthetics, and code.
                </p>
                <div class="flex gap-4">
                    <a href="#"
                        class="w-10 h-10 border border-white/20 rounded-full flex items-center justify-center hover:bg-white hover:text-black transition-colors">IG</a>
                    <a href="#"
                        class="w-10 h-10 border border-white/20 rounded-full flex items-center justify-center hover:bg-white hover:text-black transition-colors">LN</a>
                    <a href="#"
                        class="w-10 h-10 border border-white/20 rounded-full flex items-center justify-center hover:bg-white hover:text-black transition-colors">YT</a>
                </div>
            </div>
            <div>
                <h4 class="text-xs uppercase tracking-widest text-bb-gold mb-6">Sitemap</h4>
                <ul class="space-y-4 text-white/60 font-body text-sm">
                    <li><a href="blackbanana.html" class="hover:text-white transition-colors">Home</a></li>
                    <li><a href="blackbanana.html#work" class="hover:text-white transition-colors">Work</a></li>
                    <li><a href="#" class="text-bb-gold">Services</a></li>
                    <li><a href="blackbanana.html#contact" class="hover:text-white transition-colors">Contact</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
    <script>
        const lenis = new Lenis({ duration: 1.2, smooth: true });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);
    </script>

    <!-- Include central API logic -->
    <script src="script.js"></script>
    <script>
        async function renderExpertise() {
            const container = document.getElementById('servicesContainer');
            if (!container) return;
            const expertise = await BB_DB.getExpertise();
            if (!expertise || expertise.length === 0) {
                container.innerHTML = '<div class="col-span-3 text-center text-white/50 py-12">No services found.</div>';
                return;
            }

            container.innerHTML = expertise.map((e, idx) => `
                <div class="service-card group bg-[#0A0A0A] hover-trigger border border-white/5 hover:border-bb-gold/30 hover:shadow-[0_0_30px_rgba(245,158,11,0.1)] transition-all duration-500 flex flex-col items-center justify-center p-8 text-center relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-50"></div>
                    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-32 bg-bb-gold/5 rounded-full blur-3xl group-hover:bg-bb-gold/10 transition-colors"></div>
                    <div class="relative z-10 transform group-hover:scale-110 transition-transform duration-500">${e.icon || ''}</div>
                    <div class="relative z-10">
                        <div class="text-bb-gold text-xs font-bold uppercase tracking-widest mb-2">${e.title ? e.title.split(' ')[0] : 'Expertise'}</div>
                        <h3 class="text-2xl md:text-3xl font-bold uppercase mb-4 text-white">${e.title}</h3>
                        <p class="text-white/50 text-sm max-w-xs mx-auto leading-relaxed">${e.desc}</p>
                    </div>
                    <div class="absolute top-4 right-6 text-5xl md:text-6xl font-bold text-white/5 group-hover:text-bb-gold/10 transition-colors z-0 select-none">${e.code}</div>
                </div>
            `).join('');
        }

        window.addEventListener('load', renderExpertise);
    </script>
</body>

</html>
