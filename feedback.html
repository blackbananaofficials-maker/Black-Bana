<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLACK BANANA | Feedback</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="icon" type="image/png" href="logo_head.png">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                        body: ['Inter', 'sans-serif']
                    },
                    colors: {
                        bb: {
                            black: '#050505',
                            gold: '#F59E0B'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
        }

        /* CUSTOM CLOSE BUTTON ANIMATION */
        .animated-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            width: 32px;
            height: 32px;
            cursor: pointer;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .animated-close .close-line {
            width: 24px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.5);
            position: absolute;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* Initial State: Only one line visible */
        .animated-close .line-1 {
            transform: translateY(0) rotate(0);
            width: 20px;
        }

        .animated-close .line-2 {
            transform: translateY(0) rotate(0);
            width: 0px;
            opacity: 0;
            background-color: #F59E0B;
        }

        /* Hover State: Transform into an X */
        .animated-close:hover .line-1 {
            transform: rotate(45deg);
            background-color: #F59E0B;
            width: 24px;
        }

        .animated-close:hover .line-2 {
            opacity: 1;
            transform: rotate(-45deg);
            width: 24px;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-lg bg-[#0F0F0F] border border-white/10 p-8 md:p-12 rounded-2xl relative overflow-hidden">

        <div class="absolute top-0 right-0 w-32 h-32 bg-bb-gold/10 rounded-full blur-[50px]"></div>

        <!-- Animated Close Button (Returns to Main Site) -->
        <a href="blackbanana.html" class="animated-close">
            <div class="close-line line-1"></div>
            <div class="close-line line-2"></div>
        </a>

        <div class="mb-8 text-center pt-4">
            <a href="blackbanana.html" class="inline-block mb-8 hover:opacity-80 transition-opacity">
                <img src="logo_navbar.png" alt="Black Banana" class="h-8">
            </a>
            <h1 class="text-3xl font-bold uppercase mb-2">Client Feedback</h1>
            <p class="text-white/40 text-sm">Help us refine our craft.</p>
        </div>

        <form onsubmit="handleSubmit(event)" class="space-y-6 relative z-10">

            <div>
                <label class="block text-xs uppercase tracking-widest text-white/40 mb-2">Your Name</label>
                <input type="text" id="r-name"
                    class="w-full bg-white/5 border border-white/10 p-4 rounded-lg focus:border-bb-gold outline-none text-white transition-colors"
                    required>
            </div>

            <div>
                <label class="block text-xs uppercase tracking-widest text-white/40 mb-2">Role / Company</label>
                <input type="text" id="r-role"
                    class="w-full bg-white/5 border border-white/10 p-4 rounded-lg focus:border-bb-gold outline-none text-white transition-colors"
                    required>
            </div>

            <div>
                <label class="block text-xs uppercase tracking-widest text-white/40 mb-2">Rating</label>
                <div class="flex gap-4">
                    <label class="cursor-pointer"><input type="radio" name="rating" value="5" checked
                            class="accent-bb-gold"> 5</label>
                    <label class="cursor-pointer"><input type="radio" name="rating" value="4" class="accent-bb-gold">
                        4</label>
                    <label class="cursor-pointer"><input type="radio" name="rating" value="3" class="accent-bb-gold">
                        3</label>
                    <label class="cursor-pointer"><input type="radio" name="rating" value="2" class="accent-bb-gold">
                        2</label>
                    <label class="cursor-pointer"><input type="radio" name="rating" value="1" class="accent-bb-gold">
                        1</label>
                </div>
            </div>

            <div>
                <label class="block text-xs uppercase tracking-widest text-white/40 mb-2">Feedback</label>
                <textarea id="r-text" rows="4"
                    class="w-full bg-white/5 border border-white/10 p-4 rounded-lg focus:border-bb-gold outline-none text-white transition-colors"
                    required></textarea>
            </div>

            <button type="submit"
                class="w-full py-4 bg-bb-gold text-black font-bold uppercase tracking-widest rounded-lg hover:bg-white transition-colors">
                Submit Feedback
            </button>
        </form>

    </div>

    <script src="script.js"></script>
    <script>
        async function handleSubmit(e) {
            e.preventDefault();

            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = "Submitting...";
            btn.disabled = true;

            const name = document.getElementById('r-name').value;
            const role = document.getElementById('r-role').value;
            const text = document.getElementById('r-text').value;
            const ratingStr = document.querySelector('input[name="rating"]:checked').value;
            const rating = parseInt(ratingStr, 10);

            try {
                // Call API
                await BB_DB.addReview({
                    name, role, text, rating
                });

                // Success State
                btn.innerText = "Success!";
                btn.classList.remove('bg-bb-gold', 'text-black');
                btn.classList.add('bg-green-500', 'text-white');

                setTimeout(() => {
                    window.location.href = 'blackbanana.html';
                }, 1000);

            } catch (err) {
                console.error(err);
                alert("Error submitting feedback: " + err.message);
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
